name: Daily NXT Disclosure Scanner

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Scan date in YYYY-MM-DD. Leave blank for today in Korea."
        required: false
        type: string
  schedule:
    # 19:00 KST = 10:00 UTC
    - cron: "0 10 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scanner_requirements.txt

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanner_requirements.txt

      - name: Resolve target date
        id: date
        env:
          INPUT_DATE: ${{ inputs.target_date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "target_date=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "target_date=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TZ: Asia/Seoul
        run: |
          python github_actions_runner.py --date "${{ steps.date.outputs.target_date }}"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: nxt-reports-${{ steps.date.outputs.target_date }}
          path: |
            reports/${{ steps.date.outputs.target_date }}_nxt_candidates.csv
            reports/${{ steps.date.outputs.target_date }}_nxt_candidates.json
            reports/${{ steps.date.outputs.target_date }}_nxt_report.html
            reports/${{ steps.date.outputs.target_date }}_nxt_candidates.xlsx
          if-no-files-found: error
          retention-days: 30
