name: Daily NXT Disclosure Scanner

on:
  workflow_dispatch:
  schedule:
    # 06:00 KST = 21:00 UTC on the previous UTC day
    - cron: "0 21 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scanner_requirements.txt

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanner_requirements.txt

      - name: Resolve target date
        id: date
        run: |
          echo "target_date=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: Run scanner
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TZ: Asia/Seoul
        run: |
          python github_actions_runner.py --mode daily-report --date "${{ steps.date.outputs.target_date }}"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: nxt-reports-${{ steps.date.outputs.target_date }}
          path: |
            reports/${{ steps.date.outputs.target_date }}_nxt_candidates.csv
            reports/${{ steps.date.outputs.target_date }}_nxt_candidates.json
            reports/${{ steps.date.outputs.target_date }}_nxt_report.html
            reports/${{ steps.date.outputs.target_date }}_nxt_candidates.xlsx
          if-no-files-found: error
          retention-days: 30
